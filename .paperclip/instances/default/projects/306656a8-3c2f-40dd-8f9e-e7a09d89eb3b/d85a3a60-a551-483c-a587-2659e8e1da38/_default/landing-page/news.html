<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Orbit mAInd — Space and aerospace news. Daily articles on launches, missions, discoveries, and the space industry.">
  <title>News — Orbit mAInd</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #0d1124;
      --border: #1e2a4a;
      --text-primary: #c9d8f0;
      --text-secondary: #8fa8c8;
      --text-muted: #4a6a8a;
      --blue-accent: #3a7fd4;
      --blue-bright: #7eb8f7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background-color: rgba(10,14,26,0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    .nav-logo {
      font-size: 16px;
      font-weight: bold;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: 1px;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Arial', sans-serif;
      transition: color 0.2s;
    }

    .nav-links a:hover, .nav-links a.active { color: var(--blue-bright); }

    /* HEADER */
    .page-header {
      padding: 60px 40px 40px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .page-header h1 {
      font-size: 36px;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .page-header p {
      color: var(--text-secondary);
      font-family: 'Arial', sans-serif;
      font-size: 14px;
    }

    /* CONTROLS */
    .controls {
      max-width: 1000px;
      margin: 0 auto 32px;
      padding: 0 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 16px;
      gap: 10px;
    }

    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'Arial', sans-serif;
    }

    .search-bar input::placeholder { color: var(--text-muted); }

    .search-icon {
      color: var(--text-muted);
      font-size: 16px;
    }

    .tags-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .tag-filter {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'Arial', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tag-filter:hover {
      border-color: var(--blue-accent);
      color: var(--blue-bright);
    }

    .tag-filter.active {
      background-color: var(--blue-accent);
      border-color: var(--blue-accent);
      color: #fff;
    }

    .tags-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      font-family: 'Arial', sans-serif;
      margin-right: 4px;
    }

    /* ARTICLE GRID */
    .articles-grid {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 40px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .article-card {
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .article-card:hover {
      border-color: var(--blue-accent);
      transform: translateY(-2px);
    }

    .article-date {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'Arial', sans-serif;
      letter-spacing: 1px;
    }

    .article-title {
      font-size: 18px;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .article-summary {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.7;
      font-family: 'Arial', sans-serif;
    }

    .article-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: auto;
    }

    .article-tag {
      padding: 3px 8px;
      border-radius: 12px;
      background-color: rgba(58,127,212,0.12);
      border: 1px solid rgba(58,127,212,0.25);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--blue-bright);
      font-family: 'Arial', sans-serif;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-family: 'Arial', sans-serif;
      font-size: 14px;
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      overflow-y: auto;
      padding: 40px 20px;
    }

    .modal-overlay.open { display: flex; justify-content: center; align-items: flex-start; }

    .modal {
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      max-width: 700px;
      width: 100%;
      padding: 40px;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }

    .modal-close:hover { color: var(--text-primary); }

    .modal-date {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'Arial', sans-serif;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .modal-title {
      font-size: 26px;
      color: var(--text-primary);
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 24px;
    }

    .modal-content {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.8;
      font-family: 'Arial', sans-serif;
    }

    .modal-content p { margin-bottom: 16px; }
    .modal-content p:last-child { margin-bottom: 0; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 40px;
      text-align: center;
    }

    footer p {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'Arial', sans-serif;
      margin: 4px 0;
    }

    footer a { color: var(--blue-accent); text-decoration: none; }

    @media (max-width: 600px) {
      nav { padding: 16px 20px; }
      .page-header, .controls, .articles-grid { padding-left: 20px; padding-right: 20px; }
      .articles-grid { grid-template-columns: 1fr; }
      .modal { padding: 24px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">&#127760; Orbit mAInd</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="news.html" class="active">News</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <!-- HEADER -->
  <div class="page-header">
    <h1>Space News</h1>
    <p>Daily coverage of launches, missions, discoveries, and the space industry.</p>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-bar">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="search-input" placeholder="Search articles…" autocomplete="off">
    </div>
    <div class="tags-bar" id="tags-bar">
      <span class="tags-label">Filter:</span>
      <button class="tag-filter active" data-tag="all">All</button>
    </div>
  </div>

  <!-- ARTICLES -->
  <div class="articles-grid" id="articles-grid">
    <div class="no-results">Loading articles…</div>
  </div>

  <!-- ARTICLE MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close">&times;</button>
      <div class="modal-date" id="modal-date"></div>
      <h2 class="modal-title" id="modal-title"></h2>
      <div class="modal-tags" id="modal-tags"></div>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p><strong style="color:#5a7fa8;">Orbit mAInd</strong> &mdash; Space and aerospace news</p>
    <p>
      <a href="index.html">Home</a> &middot;
      <a href="privacy.html">Privacy</a> &middot;
      <a href="about.html">About</a> &middot;
      <a href="mailto:orbitmaind@gmail.com">Contact</a>
    </p>
    <p style="margin-top: 16px; font-size: 11px; color: #2a3a52;">
      &copy; <span id="footer-year"></span> Orbit mAInd. All rights reserved.
    </p>
  </footer>

  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    let allArticles = [];
    let activeTag = 'all';
    let searchQuery = '';

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T12:00:00Z');
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function buildTagFilters(articles) {
      const tagSet = new Set();
      articles.forEach(a => (a.tags || []).forEach(t => tagSet.add(t)));
      const bar = document.getElementById('tags-bar');
      tagSet.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'tag-filter';
        btn.dataset.tag = tag;
        btn.textContent = tag;
        btn.addEventListener('click', () => setTag(tag, btn));
        bar.appendChild(btn);
      });
    }

    function setTag(tag, el) {
      activeTag = tag;
      document.querySelectorAll('.tag-filter').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    function render() {
      const grid = document.getElementById('articles-grid');
      const q = searchQuery.toLowerCase();

      const filtered = allArticles.filter(a => {
        const matchTag = activeTag === 'all' || (a.tags || []).includes(activeTag);
        const matchSearch = !q ||
          a.title.toLowerCase().includes(q) ||
          a.summary.toLowerCase().includes(q) ||
          (a.tags || []).some(t => t.toLowerCase().includes(q));
        return matchTag && matchSearch;
      });

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="no-results">No articles found.</div>';
        return;
      }

      grid.innerHTML = filtered.map(a => `
        <div class="article-card" data-id="${a.id}">
          <div class="article-date">${formatDate(a.date)}</div>
          <div class="article-title">${a.title}</div>
          <div class="article-summary">${a.summary}</div>
          <div class="article-tags">
            ${(a.tags || []).map(t => `<span class="article-tag">${t}</span>`).join('')}
          </div>
        </div>
      `).join('');

      grid.querySelectorAll('.article-card').forEach(card => {
        card.addEventListener('click', () => openModal(card.dataset.id));
      });
    }

    function openModal(id) {
      const a = allArticles.find(x => x.id === id);
      if (!a) return;
      document.getElementById('modal-date').textContent = formatDate(a.date);
      document.getElementById('modal-title').textContent = a.title;
      document.getElementById('modal-tags').innerHTML = (a.tags || []).map(t => `<span class="article-tag">${t}</span>`).join('');
      document.getElementById('modal-content').innerHTML = a.content || '<p>' + a.summary + '</p>';
      document.getElementById('modal-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      render();
    });

    // Tag "All" click
    document.querySelector('[data-tag="all"]').addEventListener('click', function() {
      setTag('all', this);
    });

    // Load articles
    fetch('articles/index.json')
      .then(r => r.json())
      .then(data => {
        allArticles = data.sort((a, b) => b.date.localeCompare(a.date));
        buildTagFilters(allArticles);
        render();
      })
      .catch(() => {
        document.getElementById('articles-grid').innerHTML =
          '<div class="no-results">Failed to load articles. Please try again later.</div>';
      });
  </script>
</body>
</html>
